name: Validate Croda Structure

on:
  pull_request:
  push:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository structure
        run: python .github/scripts/validate_structure.py
